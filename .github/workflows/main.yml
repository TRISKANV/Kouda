name: Build Koda APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04 # Versión estable para compilación
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        uses: ArtemSerebryakov/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Koda-Tactical-Mobile
          path: bin/*.apk
