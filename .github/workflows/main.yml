name: Build Koda APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libncurses6 libncursesw6 \
          libtinfo5 cmake libffi-dev libssl-dev python3-pip python3-setuptools \
          libltdl-dev libgmp-dev libsqlite3-dev openjdk-17-jdk \
          lib32stdc++6 lib32z1

      - name: Install Buildozer in Isolated Venv
        run: |
          python -m venv venv
          source venv/bin/activate
          # Instalamos versiones exactas que sabemos que no tienen el bug de 'Context'
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "Cython==0.29.33" "sh==1.14.3"

      - name: Build with Buildozer
        run: |
          source venv/bin/activate
          # Borramos la carpeta .buildozer para que no haya archivos de 'Context' viejos
          rm -rf .buildozer
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          BUILDOZER_ALLOW_ORG_TEST: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Koda-Tactical-App
          path: bin/*.apk
