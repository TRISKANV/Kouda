name: Build Koda APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Compilar con Buildozer (Entorno Aislado)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          # Esto ejecuta buildozer dentro de un contenedor Docker limpio
          command: buildozer android debug
          buildozer_version: stable

      - name: Subir el APK
        uses: actions/upload-artifact@v4
        with:
          name: Koda-Tactical-App
          path: bin/*.apk
