name: Build Koda APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5 libncursesw5 cmake libffi-dev libssl-dev python3-pip python3-setuptools \
          libltdl-dev libgmp-dev libsqlite3-dev openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade "Cython<3.0.0" virtualenv buildozer
          export PATH=$PATH:~/.local/bin

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # LIMPIEZA DE VARIABLES DE ENTORNO
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_HOME
          unset ANDROID_HOME
          
          # LIMPIAR LOGS ANTERIORES PARA EVITAR "DIRTY BUILDS"
          rm -rf .buildozer
          
          # FORZAR DESCARGA LIMPIA DEL NDK
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          BUILDOZER_ALLOW_ORG_TEST: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Koda-Tactical-App
          path: bin/*.apk
